<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>嫂子模擬器 · SEVENTEEN 定向版</title>
<style>
  /* ========== 基礎設定 ========== */
  :root {
    --bg-warm: #f5ece1;
    --bg-warm-deep: #ead7c0;
    --bg-night: #1c1a2c;
    --bg-night-deep: #0e0c1c;
    --primary: #d99878;
    --primary-deep: #b06d52;
    --accent: #f5b7a3;
    --ink: #2b2620;
    --ink-soft: #4a4036;
    --muted: #8a7d70;
    --line: rgba(176,109,82,0.18);
    --glass: rgba(255,253,248,0.55);
    --glass-deep: rgba(255,253,248,0.75);
    --shadow: 0 10px 30px rgba(89,55,30,0.12);
    --os-pink: #d9437a;
    --xhs-red: #ff2442;
    --wechat-bg: #ededed;
    --wechat-name: #888;
    --wechat-text: #111;
    --pyq-blue: #576b95;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Helvetica Neue", sans-serif;
    background: var(--bg-warm);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: contain;
  }
  body.theme-night { background: linear-gradient(160deg, #1c1a2c 0%, #0e0c1c 60%, #1a1530 100%); color: #f0e9dd; }
  body.theme-sunset { background: linear-gradient(160deg, #ffd4b0 0%, #f5b7a3 50%, #b06d52 100%); }
  body.theme-morning { background: linear-gradient(160deg, #fff5e6 0%, #ffe0c2 100%); }

  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    background: inherit;
  }

  /* ========== 通用按鈕 ========== */
  .btn {
    display: inline-block;
    padding: 14px 28px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-deep) 100%);
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.04em;
    text-align: center;
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(176,109,82,0.35);
    transition: transform .25s ease, box-shadow .25s ease, opacity .2s;
    backdrop-filter: blur(8px);
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost {
    background: var(--glass);
    color: var(--ink);
    border: 1px solid var(--line);
    box-shadow: none;
    backdrop-filter: blur(12px);
  }

  /* ========== Stage A：封面 ========== */
  .cover {
    position: relative;
    min-height: 100vh;
    overflow: hidden;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.15) 0%, transparent 30%, transparent 60%, rgba(0,0,0,0.25) 100%),
      url('assets/cover.png') center/cover no-repeat,
      linear-gradient(160deg, #fff1e0 0%, #f5d6b8 50%, #d9a888 100%);
  }
  .cover-art {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 50% 35%, rgba(255,255,255,0.15) 0, transparent 40%);
    pointer-events: none;
  }
  /* 抽象舞台燈光 */
  .stage-lights {
    position: absolute; inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .stage-lights::before, .stage-lights::after {
    content: ''; position: absolute;
    width: 200px; height: 400px;
    background: linear-gradient(to bottom, rgba(255,220,180,0.5), transparent);
    transform-origin: top center;
    filter: blur(20px);
    animation: sway 8s ease-in-out infinite;
  }
  .stage-lights::before { left: 10%; top: -50px; transform: rotate(-20deg); }
  .stage-lights::after { right: 10%; top: -50px; transform: rotate(20deg); animation-delay: -4s; }
  @keyframes sway {
    0%, 100% { transform: rotate(-20deg) translateX(0); opacity: 0.7; }
    50% { transform: rotate(-10deg) translateX(20px); opacity: 1; }
  }

  /* 漂浮星 */
  .star {
    position: absolute; width: 4px; height: 4px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 8px #fff, 0 0 16px rgba(255,255,255,0.6);
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  .cover-title {
    position: absolute;
    top: 12%;
    left: 0; right: 0;
    text-align: center;
    z-index: 3;
  }
  .cover-title h1 {
    font-size: 38px;
    font-weight: 800;
    margin: 0;
    background: linear-gradient(135deg, #fff 0%, #ffd9b8 50%, #b06d52 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 0.05em;
    text-shadow: 0 4px 30px rgba(255,200,150,0.6);
    line-height: 1.15;
  }
  .cover-title .sub {
    margin-top: 10px;
    font-size: 13px;
    color: rgba(80,50,30,0.85);
    letter-spacing: 0.4em;
    font-weight: 500;
  }
  .cover-title .badge {
    display: inline-block;
    margin-top: 14px;
    padding: 5px 14px;
    background: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 999px;
    font-size: 11px;
    color: var(--primary-deep);
    backdrop-filter: blur(10px);
    letter-spacing: 0.2em;
  }

  .cover-intro {
    position: absolute;
    bottom: 18%;
    left: 24px; right: 24px;
    padding: 18px 20px;
    background: var(--glass-deep);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 18px;
    backdrop-filter: blur(20px);
    box-shadow: var(--shadow);
    z-index: 3;
  }
  .cover-intro p {
    margin: 0;
    font-size: 13.5px;
    line-height: 1.8;
    color: var(--ink-soft);
  }
  .cover-cta {
    position: absolute;
    bottom: 8%;
    left: 0; right: 0;
    text-align: center;
    z-index: 3;
  }
  .cover-cta .btn { padding: 16px 48px; font-size: 16px; }
  .cover-disclaimer {
    position: absolute;
    bottom: 2%;
    left: 0; right: 0;
    text-align: center;
    font-size: 10px;
    color: rgba(80,50,30,0.6);
    letter-spacing: 0.1em;
    z-index: 3;
  }

  /* ========== Stage B：角色創建 ========== */
  .creation {
    padding: 28px 20px 120px;
    min-height: 100vh;
  }
  .creation-header {
    text-align: center;
    padding: 12px 0 20px;
  }
  .creation-header h2 {
    font-size: 22px;
    margin: 0 0 6px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.05em;
  }
  .creation-header p {
    margin: 0;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.3em;
  }
  .section {
    margin-top: 24px;
    padding: 18px 18px 18px;
    background: var(--glass-deep);
    border: 1px solid var(--line);
    border-radius: 18px;
    backdrop-filter: blur(12px);
    box-shadow: var(--shadow);
  }
  .section h3 {
    margin: 0 0 14px;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    display: flex; align-items: center;
    gap: 8px;
  }
  .section h3::before {
    content: ''; width: 4px; height: 16px;
    background: linear-gradient(to bottom, var(--primary), var(--primary-deep));
    border-radius: 4px;
  }
  .field-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .field-row label { flex: 0 0 70px; align-self: center; font-size: 13px; color: var(--ink-soft); }
  .field-row input {
    flex: 1; padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.7);
    font-size: 16px;
    color: var(--ink);
    font-family: inherit;
    outline: none;
  }
  .field-row input:focus { border-color: var(--primary); background: #fff; }

  .identity-list, .options-list { display: flex; flex-direction: column; gap: 8px; }
  .opt {
    padding: 12px 14px;
    background: rgba(255,255,255,0.6);
    border: 1.5px solid var(--line);
    border-radius: 14px;
    cursor: pointer;
    font-size: 13.5px;
    color: var(--ink-soft);
    line-height: 1.55;
    transition: all .25s ease;
  }
  .opt b { color: var(--ink); font-weight: 700; margin-right: 4px; }
  .opt:hover { background: #fff; }
  .opt.active {
    background: linear-gradient(135deg, rgba(217,152,120,0.18) 0%, rgba(245,183,163,0.18) 100%);
    border-color: var(--primary);
    box-shadow: 0 4px 14px rgba(176,109,82,0.18);
  }

  /* 13 位男主卡片 */
  .members-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .member-card {
    padding: 12px 12px 14px;
    background: rgba(255,255,255,0.7);
    border: 1.5px solid var(--line);
    border-radius: 16px;
    cursor: pointer;
    text-align: center;
    transition: all .25s ease;
    position: relative;
    overflow: hidden;
  }
  .member-card::before {
    content: '';
    display: block;
    width: 64px; height: 64px;
    margin: 4px auto 8px;
    border-radius: 50%;
    background-color: var(--mc-bg, #f5b7a3);
    background-image: var(--mc-img);
    background-size: cover;
    background-position: center top;
    box-shadow: 0 4px 16px rgba(176,109,82,0.3);
    position: relative;
  }
  .member-card .ko {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .member-card .en {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  .member-card .role {
    margin-top: 6px;
    font-size: 10px;
    color: var(--primary-deep);
    background: rgba(217,152,120,0.12);
    padding: 2px 8px;
    border-radius: 999px;
    display: inline-block;
  }
  .member-card.active {
    border-color: var(--primary);
    background: linear-gradient(135deg, rgba(245,183,163,0.2) 0%, rgba(255,255,255,0.9) 100%);
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(176,109,82,0.25);
  }

  .creation-footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-width: 480px;
    margin: 0 auto;
    padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--bg-warm) 60%, rgba(245,236,225,0));
    z-index: 50;
  }
  .creation-footer .btn { width: 100%; }

  /* ========== 角色卡展示 ========== */
  .char-card-wrap {
    padding: 28px 20px 120px;
    min-height: 100vh;
  }
  .char-portrait {
    width: 180px; height: 180px;
    margin: 20px auto 16px;
    border-radius: 50%;
    background-color: var(--cp-bg, #b06d52);
    background-image: var(--cp-img);
    background-size: cover;
    background-position: center top;
    box-shadow: 0 16px 40px rgba(176,109,82,0.4);
    position: relative;
    border: 4px solid rgba(255,255,255,0.6);
  }
  .char-portrait::after {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px dashed rgba(176,109,82,0.4);
    animation: rotate 30s linear infinite;
  }
  @keyframes rotate { to { transform: rotate(360deg); } }
  .char-name {
    text-align: center;
    font-size: 22px;
    font-weight: 800;
    color: var(--ink);
  }
  .char-name .en { font-size: 13px; color: var(--muted); margin-left: 6px; font-weight: 500; }
  .char-role-tag {
    text-align: center;
    margin: 6px 0 18px;
  }
  .char-role-tag span {
    display: inline-block;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--primary-deep);
    background: rgba(217,152,120,0.15);
    border-radius: 999px;
    margin: 0 3px;
  }

  .stat-matrix {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin: 16px 0;
  }
  .stat-item {
    padding: 10px 8px;
    background: var(--glass-deep);
    border-radius: 12px;
    border: 1px solid var(--line);
    text-align: center;
  }
  .stat-item .label { font-size: 10px; color: var(--muted); }
  .stat-item .value { font-size: 16px; font-weight: 700; color: var(--ink); margin-top: 2px; }

  .accordion {
    margin-top: 12px;
    background: var(--glass-deep);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
  }
  .accordion-head {
    padding: 12px 16px;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    color: var(--ink);
  }
  .accordion-head::after { content: '▾'; font-size: 12px; color: var(--muted); transition: transform .2s; }
  .accordion.open .accordion-head::after { transform: rotate(180deg); }
  .accordion-body {
    max-height: 0; overflow: hidden;
    transition: max-height .3s ease;
    padding: 0 16px;
    font-size: 12.5px;
    line-height: 1.7;
    color: var(--ink-soft);
  }
  .accordion.open .accordion-body { max-height: 400px; padding: 0 16px 14px; }

  /* ========== Stage C：劇情主介面 ========== */
  .story-screen { padding: 0 0 90px; min-height: 100vh; }

  /* 頂部狀態主控面板 */
  .hud {
    position: sticky;
    top: 0;
    z-index: 30;
    background: var(--glass-deep);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--line);
    padding: 10px 14px 8px;
  }
  .hud-row1 {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11.5px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .hud-row1 .chapter { font-weight: 700; color: var(--ink); }
  .hud-row1 .stage { font-size: 10px; padding: 2px 8px; background: rgba(217,152,120,0.18); color: var(--primary-deep); border-radius: 999px; }
  .hud-stats {
    display: flex; gap: 6px; overflow-x: auto;
    scrollbar-width: none;
  }
  .hud-stats::-webkit-scrollbar { display: none; }
  .hud-stat {
    flex: 0 0 auto;
    padding: 4px 10px;
    font-size: 11px;
    background: rgba(255,255,255,0.6);
    border-radius: 999px;
    border: 1px solid var(--line);
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .hud-stat b { color: var(--ink); font-weight: 700; }
  .hud-stat.flash { animation: flash 1s ease; }
  @keyframes flash {
    0% { background: rgba(217,67,122,0.4); transform: scale(1.06); }
    100% { background: rgba(255,255,255,0.6); transform: scale(1); }
  }

  .hud-toggle {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    cursor: pointer;
  }
  .hud.collapsed .hud-stats { max-height: 0; opacity: 0; padding: 0; margin: 0; overflow: hidden; }

  /* 劇情主體 */
  .story-body { padding: 20px 22px 12px; }
  .story-text {
    font-size: 15px;
    line-height: 2;
    color: var(--ink);
    letter-spacing: 0.02em;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .story-text .os-text {
    display: inline-block;
    color: var(--os-pink);
    font-style: italic;
    font-size: 13.5px;
    background: linear-gradient(120deg, rgba(217,67,122,0.08), rgba(255,200,180,0.08));
    padding: 2px 8px;
    border-radius: 6px;
    margin: 0 2px;
  }
  .story-text .typing-cursor {
    display: inline-block;
    width: 2px;
    height: 16px;
    background: var(--primary-deep);
    vertical-align: middle;
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* 章節分隔 */
  .chapter-divider {
    text-align: center;
    margin: 30px 0;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.4em;
  }
  .chapter-divider::before, .chapter-divider::after {
    content: ''; display: inline-block;
    width: 40px; height: 1px;
    background: var(--line);
    vertical-align: middle;
    margin: 0 12px;
  }

  /* 交互組件（選項 + 自由輸入） */
  .choice-container {
    margin-top: 24px;
    display: flex; flex-direction: column; gap: 10px;
    animation: fadeIn .5s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .choice {
    padding: 14px 16px;
    background: var(--glass-deep);
    border: 1.5px solid var(--line);
    border-radius: 14px;
    cursor: pointer;
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--ink);
    transition: all .25s ease;
    backdrop-filter: blur(8px);
    text-align: left;
  }
  .choice .label-key {
    display: inline-block;
    width: 22px; height: 22px; line-height: 22px;
    text-align: center;
    background: linear-gradient(135deg, var(--primary), var(--primary-deep));
    color: #fff;
    font-weight: 700; font-size: 11px;
    border-radius: 50%;
    margin-right: 10px;
    vertical-align: middle;
  }
  .choice:hover { transform: translateX(4px); border-color: var(--primary); }
  .choice .delta {
    display: block;
    margin-top: 4px;
    margin-left: 32px;
    font-size: 10.5px;
    color: var(--muted);
  }
  .custom-input-group {
    margin-top: 6px;
    display: flex;
    gap: 8px;
    background: var(--glass-deep);
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 6px;
  }
  .custom-input-group input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 8px 12px;
    font-size: 16px;
    color: var(--ink);
    outline: none;
    font-family: inherit;
  }
  .custom-input-group button {
    padding: 8px 16px;
    border-radius: 999px;
    border: none;
    background: linear-gradient(135deg, var(--primary), var(--primary-deep));
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }

  .safe-area-bottom { height: 140px; }

  /* 底部互動模組（吸底） */
  .interaction-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-width: 480px;
    margin: 0 auto;
    height: 56px;
    display: flex;
    background: var(--glass-deep);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--line);
    box-shadow: 0 -4px 20px rgba(89,55,30,0.08);
    z-index: 40;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .interaction-bar button {
    flex: 1;
    border: none; background: transparent;
    font-size: 13px;
    color: var(--ink);
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
    border-right: 1px solid var(--line);
  }
  .interaction-bar button:last-child { border-right: none; }
  .interaction-bar button .icon { font-size: 16px; }

  /* ========== 抽屜（小紅書 / 秘密互動） ========== */
  #drawer-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    visibility: hidden; opacity: 0;
    transition: opacity .3s ease, visibility .3s ease;
    z-index: 100;
    max-width: 480px;
    margin: 0 auto;
  }
  #drawer-overlay.active { visibility: visible; opacity: 1; }
  #drawer-overlay .drawer-content {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-radius: 20px 20px 0 0;
    transform: translateY(100%);
    transition: transform .35s cubic-bezier(0.16, 1, 0.3, 1);
    max-height: 92vh;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  #drawer-overlay.active .drawer-content { transform: translateY(0); }
  .drawer-handle {
    width: 36px; height: 4px;
    background: #d8d2cc;
    border-radius: 2px;
    margin: 10px auto 6px;
  }
  .drawer-header {
    padding: 6px 20px 14px;
    border-bottom: 1px solid #f0e9dd;
    display: flex; justify-content: space-between; align-items: center;
  }
  .drawer-header h3 { margin: 0; font-size: 16px; color: var(--ink); font-weight: 700; }
  .drawer-header .close-btn {
    background: transparent; border: none;
    font-size: 20px; color: var(--muted);
    cursor: pointer; padding: 4px 8px;
  }
  .drawer-body { padding: 14px 18px 30px; }

  /* 小紅書熱搜列表 */
  .xhs-trending { display: flex; flex-direction: column; gap: 10px; }
  .xhs-item {
    padding: 14px 16px;
    background: linear-gradient(120deg, #fff5f5, #ffeae8);
    border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center;
    gap: 10px;
    transition: transform .2s;
  }
  .xhs-item:active { transform: scale(0.98); }
  .xhs-item .rank {
    font-size: 18px; font-weight: 900;
    background: linear-gradient(135deg, var(--xhs-red), #ff8b6e);
    -webkit-background-clip: text; background-clip: text;

const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
const app = () => $('#app');

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function rand(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function memberImg(idx) { return `assets/member-bg/member-${String(idx+1).padStart(2,'0')}.png`; }

function updateStats(delta) {
  Object.keys(delta).forEach(k => {
    if (state.stats[k] !== undefined) {
      state.stats[k] = clamp(state.stats[k] + delta[k], 0, k === 'money' ? 99999 : 100);
    }
  });
  // 觸發關係階段升級
  const f = state.stats.favor;
  let newRel = '陌生人';
  if (f >= 91) newRel = '考驗期';
  else if (f >= 81) newRel = '熱戀期';
  else if (f >= 66) newRel = '確認關係';
  else if (f >= 51) newRel = '曖昧期';
  else if (f >= 31) newRel = '產生興趣';
  else if (f >= 16) newRel = '有印象';
  state.relationship = newRel;

  if (state.stage === 'story') {
    renderHUD();
    flashStats(Object.keys(delta));
  }
}

function flashStats(keys) {
  const map = {
    favor: 'fav', popularity: 'pop', mood: 'mood', money: 'money',
    secrecy: 'sec', companyAlert: 'alert', workStress: 'stress',
    youthSync: 'sync', lifeStability: 'life'
  };
  keys.forEach(k => {
    const el = document.querySelector(`[data-stat="${map[k]}"]`);
    if (el) { el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash'); }
  });
}

function floatEmoji(emoji) {
  const wrap = $('#float-emojis');
  for (let i = 0; i < 4; i++) {
    const e = document.createElement('div');
    e.className = 'float-emoji';
    e.textContent = emoji;
    e.style.left = (Math.random() * 90 + 5) + '%';
    e.style.top = (50 + Math.random() * 20) + 'vh';
    e.style.animationDelay = (i * 0.2) + 's';
    wrap.appendChild(e);
    setTimeout(() => e.remove(), 3500);
  }
}

function setTheme(t) {
  document.body.classList.remove('theme-night', 'theme-sunset', 'theme-morning');
  if (t) document.body.classList.add('theme-' + t);
}

// ============ 載入場景（含打字機效果） ============
let currentTyping = null;
function loadScene(scene) {
  if (scene.isEnding) return renderEnding(scene);

  state.week = scene.week;
  state.chapter = scene.chapter;
  state.scene = scene.scene;
  renderHUD();

  // 主題依場景調色
  if (scene.scene.includes('凌晨') || scene.scene.includes('深夜') || scene.scene.includes('論壇')) {
    setTheme('night');
  } else if (scene.week >= 4) {
    setTheme('sunset');
  } else {
    setTheme('morning');
  }

  const body = $('#story-body');
  body.innerHTML = `
    <div class="chapter-divider">第 ${scene.week} 週 · ${scene.chapter}</div>
    <p class="story-text" data-typing="true"><span class="typing-target"></span><span class="typing-cursor"></span></p>
    <div class="choice-container hidden" id="choices"></div>
  `;
  const target = body.querySelector('.typing-target');
  const cursor = body.querySelector('.typing-cursor');
  typeText(target, scene.text, () => {
    cursor.remove();
    renderChoices(scene.choices);
    // 心動 emoji 飄
    if (scene.choices && state.stats.favor > 30) floatEmoji('💗');
  });
}

function typeText(target, raw, onDone) {
  // 解析 <<OS:...>> 為 inline span
  const tokens = [];
  let i = 0;
  while (i < raw.length) {
    if (raw.substr(i, 4) === '<<OS') {
      const end = raw.indexOf('>>', i);
      if (end > -1) {
        const content = raw.substring(i + 5, end); // 去掉 "<<OS:"
        tokens.push({ os: true, text: content });
        i = end + 2;
        continue;
      }
    }
    tokens.push({ os: false, text: raw[i] });
    i++;
  }
  let idx = 0;
  if (currentTyping) clearInterval(currentTyping);

  function step() {
    if (idx >= tokens.length) {
      clearInterval(currentTyping);
      onDone && onDone();
      return;
    }
    const t = tokens[idx];
    if (t.os) {
      const osPrefix = state.player.nickname ? `${state.player.nickname} OS：` : 'Nuvva OS：';
      const span = document.createElement('span');
      span.className = 'os-text';
      span.textContent = `（${osPrefix}${t.text}）`;
      target.appendChild(span);
    } else {
      target.appendChild(document.createTextNode(t.text));
    }
    idx++;
    // 自動滾動
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }
  currentTyping = setInterval(step, 28);
}

function renderChoices(choices) {
  const c = $('#choices');
  if (!c || !choices) return;
  c.classList.remove('hidden');
  c.innerHTML = `
    ${choices.map(ch => `
      <div class="choice" onclick='applyChoice(${JSON.stringify(ch).replace(/'/g, "&#39;")})'>
        <span class="label-key">${ch.key}</span>${ch.text}
        <span class="delta">${ch.deltaText}</span>
      </div>
    `).join('')}
    <div class="custom-input-group">
      <input id="custom-input" placeholder="D. 自由行動：由你輸入…" />
      <button onclick="submitCustom()">送出</button>
    </div>
  `;
}

function applyChoice(ch) {
  updateStats(ch.delta);
  // 加一點隨機波動，模擬 DM
  if (Math.random() < 0.5) updateStats({ mood: rand(-2, 2) });
  if (ch.next && SCENES[ch.next]) {
    setTimeout(() => loadScene(SCENES[ch.next]), 400);
  } else {
    showCustomEcho('（這條選擇的後續仍在生成中，DM 將之後補上。）');
  }
}

function submitCustom() {
  const inp = $('#custom-input');
  const text = (inp?.value || '').trim();
  if (!text) return;
  // 隨機微調屬性
  updateStats({ favor: rand(0, 2), mood: rand(-2, 3), companyAlert: rand(-1, 2) });
  showCustomEcho(`你選擇：「${text}」\n\nDM 回應：他停頓了半秒，沒有正面接你的話。也許他是在想，妳的這個動作究竟意味著什麼。然後他抬起眼，輕輕地說：「好。」`);
}

function showCustomEcho(text) {
  const body = $('#story-body');
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="chapter-divider">DM 回應</div>
    <p class="story-text">${text.replace(/\n/g, '<br>')}</p>
  `;
  body.appendChild(div);
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function openWechat() {
  const m = MEMBERS[state.setup.member];
  const others = MEMBERS.filter((_, i) => i !== state.setup.member);
  const friend1 = pick(others);
  const friend2 = pick(others.filter(x => x !== friend1));
  const friend3 = pick(others.filter(x => x !== friend1 && x !== friend2));

  const dialogs = [
    [
      { who: friend1, t: '欸欸欸 他怎麼還沒回 上線顯示明明在' },
      { who: friend2, t: '別敲了 哥這幾天魂不在' },
      { who: friend1, t: '🙄 魂去哪了 練習室嗎？' },
      { who: friend2, t: '不在練習室 在便利店' },
      { who: friend3, t: '哈哈哈哈哈' },
      { who: 'main',  t: '你們 真的 不要在群裡' },
      { who: friend1, t: '哇 出現了' },
      { who: friend2, t: '哥你最近買便當的頻率是不是有點高' },
      { who: 'main',  t: '...我餓' },
      { who: friend3, t: '哈哈哈哈哈哈' },
      { who: friend1, t: '兩盒的那種餓嗎？？' },
      { who: 'main',  t: '👊' },
      { who: friend2, t: '收到 哥真的生氣了 撤退撤退' },
      { who: friend1, t: '但是我祝你幸福 真心' },
      { who: 'main',  t: '🤐' },
    ],
    [
      { who: friend3, t: '今天直播你看哪邊看了三次 哥' },
      { who: 'main',  t: '沒有' },
      { who: friend3, t: '有 我幫你數的' },
      { who: friend1, t: '靠 又開始了' },
      { who: friend2, t: '我說 哥這次是不是動真格的' },
      { who: 'main',  t: '...別問' },
      { who: friend1, t: '不問了 我祝你開心 🥲' },
      { who: friend3, t: '愛情果然能讓最忙的人多分一秒鐘給某個方向' },
      { who: 'main',  t: '你話太多' },
      { who: friend2, t: '哈哈哈哈他急了' },

  ];
  const chosen = pick(dialogs);

  const avatarStyle = (mem) => {
    if (mem === 'main') {
      return `--avc-img: url('${memberImg(state.setup.member)}'); --avc-bg: ${m.c2};`;
    }
    const idx = MEMBERS.indexOf(mem);
    return `--avc-img: url('${memberImg(idx)}'); --avc-bg: ${mem.c2};`;
  };

  openDrawer(`
    <div class="drawer-handle"></div>
    <div class="wechat">
      <div class="wechat-header">
        SVT 損友群 (13)
        <div class="sub">${m.ko}、${friend1.ko}、${friend2.ko}、${friend3.ko} 等</div>
      </div>
      <div class="wechat-body">
        <div class="system-msg-wrap"><span class="system-msg">下午 09:42</span></div>
        ${chosen.map(d => {
          const isMe = d.who === 'main';
          const who = isMe ? m : d.who;
          return `
            <div class="msg ${isMe ? 'me' : ''}">
              <div class="avatar" style="${avatarStyle(d.who)}"></div>
              <div class="content">
                <div class="name">${who.ko}</div>

        }).join('')}

}

function openDiary() {
  const m = MEMBERS[state.setup.member];
  const playerLabel = state.player.name && state.player.name !== '未命名玩家' ? state.player.name : '她';
  const variants = [
    {
      title: '不該寫的一天',
      body: `今天又經過那個便利店。

她說「謝謝」的時候，眼神是先往下看的。

我已經很久沒有為一個人，去拼湊她每一個微小的瞬間了。

我不應該記得這麼多。
我不應該記得這麼清楚。
但我記得。`,
      sign: '—— 凌晨 03:21，於宿舍'
    },
    {
      title: '關於那個側影',
      body: `我寫了一段沒人聽過的旋律。

開頭的鋼琴只有兩個小節。她不會知道，那兩個小節是因為她那天遞紙箱時手指打顫的節奏。

我把它存進那台我不准任何人碰的硬碟。

我自己也很久沒有打開了。

但今天打開了。

我不知道這算不算過界。但如果不寫下來，這種感覺好像會在我胸口憋出一個洞。`,

  ];
  const v = pick(variants);
  const date = `2025 / ${rand(1,12)} / ${rand(1,28)}`;
  openDrawer(`

// ============ 結局頁 ============
function endingImage(scene) {
  const t = scene.tag;
  if (t === 'HE') return 'assets/endings/ending-HE.png';
  if (t === 'OE') return 'assets/endings/ending-OE.png';
  if (t === 'SE') return 'assets/endings/ending-SE.png';
  if (t === 'BE') return scene.title.includes('離開')
    ? 'assets/endings/ending-BE-leave.png'
    : 'assets/endings/ending-BE-expose.png';
  return 'assets/endings/ending-HE.png';
}
function renderEnding(scene) {
  state.stage = 'ending';
  const m = MEMBERS[state.setup.member];
  setTheme(scene.tag === 'HE' || scene.tag === 'SE' ? 'sunset' : 'night');
  app().innerHTML = `
    <div class="ending">
      <div class="ending-tag">${scene.tag} · ENDING</div>
      <h1>${scene.title}</h1>
      <div class="ending-hero" style="background-image: url('${endingImage(scene)}')"></div>
      <div class="char-portrait" style="--cp-img: url('${memberImg(state.setup.member)}'); --cp-bg: ${m.c2}; width: 96px; height: 96px; margin: 8px auto;"></div>
      <p style="font-weight: 600; color: var(--ink); margin-top: 8px;">${m.ko} (${m.en})</p>
      <p>${scene.body.replace(/\n/g, '<br>')}</p>
      <div class="actions">
        <button class="btn" onclick="renderCover()">重新開始</button>
        <button class="btn btn-ghost" onclick="renderCreation()">換一位男主</button>
      </div>
      <p style="margin-top: 40px; font-size: 11px; color: var(--muted);">
        本遊戲為平行世界虛構同人創作 · 不代表現實藝人本人經歷
      </p>
    </div>
  `;
  // 撒花
  setTimeout(() => floatEmoji(scene.tag === 'BE' || scene.tag === 'OE' ? '🥀' : '💗'), 300);
  setTimeout(() => floatEmoji(scene.tag === 'BE' || scene.tag === 'OE' ? '🥀' : '✨'), 800);
}

// ============ 啟動 ============
renderCover();

// 點抽屜遮罩關閉
document.getElementById('drawer-overlay').addEventListener('click', (e) => {
  if (e.target.id === 'drawer-overlay') closeDrawer();
});
